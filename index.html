<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="You Go Boom — a chain-reaction trap-building puzzle game. Coming soon to iOS.">
  <meta property="og:title" content="You Go Boom">
  <meta property="og:description" content="A chain-reaction trap-building puzzle game. Coming soon to iOS.">
  <meta property="og:type" content="website">
  <title>You Go Boom</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #16121f;
      color: #e8e0f0;
      font-family: 'Inter', system-ui, sans-serif;
      overflow-x: hidden;
    }

    /* Vignette — matches the game's radial dark-edge effect */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 50% 48%,
        transparent 25%,
        rgba(0,0,0,0.28) 60%,
        rgba(0,0,0,0.55) 100%);
      pointer-events: none;
      z-index: 1;
    }

    /* ── HERO ─────────────────────────────────────────────────────────────── */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 4rem 1.5rem 5rem;
      text-align: center;
      z-index: 2;
    }

    /* ── BOMB ─────────────────────────────────────────────────────────────── */
    .bomb-wrap {
      position: relative;
      width: min(300px, 62vw);
      margin-bottom: 2.2rem;
    }

    /* Red pulsing glow behind the bomb — matches game's CIBloom-style aura */
    .bomb-aura {
      position: absolute;
      inset: -18%;
      border-radius: 50%;
      background: radial-gradient(circle,
        rgba(204,51,0,0.72) 0%,
        rgba(160,30,0,0.38) 40%,
        transparent 70%);
      filter: blur(22px);
      animation: aura-pulse 2.8s ease-in-out infinite;
      z-index: 0;
    }

    @keyframes aura-pulse {
      0%, 100% { opacity: 0.72; transform: scale(1.00); }
      50%       { opacity: 1.00; transform: scale(1.10); }
    }

    .bomb-svg {
      position: relative;
      z-index: 1;
      width: 100%;
      height: auto;
      filter: drop-shadow(0 6px 32px rgba(180,60,0,0.45))
              drop-shadow(0 0 8px rgba(0,0,0,0.8));
    }

    /* Flame — slow organic flicker matching the iOS app's sine-wave approach.
       Outer: ~0.9s period. Inner: ~0.55s. Both pivot around the wick tip (205,45)
       so they sway from the base like a real flame, not from their own centres.
       No spark animation — the spark dot is static just like in the app. */
    #flame-outer {
      animation: flicker-outer 1.85s ease-in-out infinite;
      transform-box: view-box;
      transform-origin: 205px 45px;
    }
    #flame-inner {
      animation: flicker-inner 1.15s ease-in-out infinite;
      transform-box: view-box;
      transform-origin: 205px 45px;
    }

    @keyframes flicker-outer {
      0%   { transform: scaleX(1.00) scaleY(1.00) rotate(-1deg); opacity: 0.88; }
      18%  { transform: scaleX(0.88) scaleY(1.10) rotate( 2deg); opacity: 0.96; }
      35%  { transform: scaleX(1.06) scaleY(0.93) rotate(-2deg); opacity: 0.84; }
      52%  { transform: scaleX(0.92) scaleY(1.08) rotate( 3deg); opacity: 1.00; }
      70%  { transform: scaleX(1.04) scaleY(0.96) rotate(-1deg); opacity: 0.90; }
      85%  { transform: scaleX(0.94) scaleY(1.05) rotate( 2deg); opacity: 0.94; }
      100% { transform: scaleX(1.00) scaleY(1.00) rotate(-1deg); opacity: 0.88; }
    }
    @keyframes flicker-inner {
      0%   { transform: scaleX(1.00) scaleY(1.00) rotate( 1deg); opacity: 0.90; }
      22%  { transform: scaleX(0.82) scaleY(1.14) rotate(-2deg); opacity: 1.00; }
      47%  { transform: scaleX(1.08) scaleY(0.90) rotate( 2deg); opacity: 0.82; }
      68%  { transform: scaleX(0.88) scaleY(1.10) rotate(-1deg); opacity: 0.96; }
      100% { transform: scaleX(1.00) scaleY(1.00) rotate( 1deg); opacity: 0.90; }
    }

    /* ── TITLE ────────────────────────────────────────────────────────────── */
    .game-title {
      font-family: 'Bebas Neue', 'Impact', 'Arial Black', sans-serif;
      font-size: clamp(3.8rem, 14vw, 8.5rem);
      letter-spacing: 0.045em;
      color: #ffbb22;
      line-height: 1;
      text-shadow:
        0 0 18px rgba(255,170,0,0.70),
        0 0 55px rgba(255,100,0,0.32),
        0 2px 6px rgba(0,0,0,0.70);
      margin-bottom: 0.25rem;
    }

    .game-subtitle {
      font-size: clamp(0.58rem, 2.2vw, 0.80rem);
      letter-spacing: 0.24em;
      color: rgba(200,185,225,0.50);
      text-transform: uppercase;
      margin-bottom: 3rem;
    }

    /* Coming Soon badge */
    .badge {
      display: inline-block;
      font-size: clamp(0.95rem, 3.2vw, 1.15rem);
      font-weight: 600;
      letter-spacing: 0.07em;
      color: rgba(232,224,240,0.80);
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.13);
      border-radius: 100px;
      padding: 0.55rem 1.9rem;
      margin-bottom: 0.8rem;
    }

    .platform {
      font-size: 0.75rem;
      color: rgba(200,185,225,0.38);
      letter-spacing: 0.08em;
    }

    /* ── FOOTER ───────────────────────────────────────────────────────────── */
    footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 1rem;
      padding: 0.8rem 1rem;
      font-size: 0.70rem;
      color: rgba(200,185,225,0.32);
      z-index: 10;
      letter-spacing: 0.04em;
    }
    footer a {
      color: rgba(200,185,225,0.46);
      text-decoration: none;
      transition: color 0.2s;
    }
    footer a:hover { color: rgba(200,185,225,0.85); }
  </style>
</head>
<body>

<main class="hero">

  <!-- Bomb illustration -->
  <div class="bomb-wrap">
    <div class="bomb-aura"></div>

    <!--
      Bomb coordinates derived directly from TitleScene.swift drawBombSphere/drawFuseRope.
      bombR=100, bomb center=(150,190) in a 300×310 SVG viewport (y-down).

      Fuse cubic bezier control points (from source, scaled to bombR=100):
        P0 = fuseStart = (150, 80)   [top of stem, 2px overlap into bomb top]
        P1 = cp1       = (157, 75)   [first control]
        P2 = cp2       = (190, 82)   [second control]
        P3 = fuseEnd   = (205, 45)   [wick tip = flame base]

      Flame centres (from source, converted y-up→y-down):
        outer: (205, 37)   [wickY - 8]
        inner: (205, 40)   [wickY - 5]
        spark: (205, 45)   [wickY, static — no animation]

      Tick marks: 9 lines perpendicular to bezier at t=0.1…0.9, half-length=2.4
    -->
    <svg class="bomb-svg" viewBox="0 0 300 310" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <defs>
        <!-- Body: radial from bright highlight focal point → dark edges.
             Exact source colors: #686868 → #242428 → #111115 at [0, 0.55, 1.0].
             Focal point offset (-0.28r, -0.28r) from centre = (122, 162). -->
        <radialGradient id="bodyGrad"
          cx="150" cy="190" r="100"
          fx="122" fy="162"
          gradientUnits="userSpaceOnUse">
          <stop offset="0%"   stop-color="#686868"/>
          <stop offset="55%"  stop-color="#242428"/>
          <stop offset="100%" stop-color="#111115"/>
        </radialGradient>

        <!-- Specular highlight spot: soft white circle at (-0.30r, -0.28r) from centre -->
        <radialGradient id="hlGrad"
          cx="120" cy="162" r="30"
          gradientUnits="userSpaceOnUse">
          <stop offset="0%"   stop-color="white" stop-opacity="0.18"/>
          <stop offset="80%"  stop-color="white" stop-opacity="0.06"/>
          <stop offset="100%" stop-color="white" stop-opacity="0"/>
        </radialGradient>

        <!-- Flame glow: gaussian blur layer under the crisp ellipse -->
        <filter id="fg" x="-120%" y="-120%" width="340%" height="340%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="b"/>
          <feMerge>
            <feMergeNode in="b"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
      </defs>

      <!-- ── Fuse rope (drawn before bomb body so body clips over stem base) ── -->

      <!-- Shadow stroke — offset slightly down-right -->
      <path d="M 151.2,81.5 C 158.2,76.5 191.2,83.5 206.2,46.5"
            stroke="rgba(0,0,0,0.30)" stroke-width="5" stroke-linecap="round" fill="none"/>

      <!-- Core rope: dark brown -->
      <path id="fuse" d="M 150,80 C 157,75 190,82 205,45"
            stroke="#5c3410" stroke-width="4" stroke-linecap="round" fill="none"/>

      <!-- Mid-tone strand -->
      <path d="M 150,80 C 157,75 190,82 205,45"
            stroke="#8a5422" stroke-width="2.6" stroke-linecap="round" fill="none"/>

      <!-- Highlight strand (shifted left 0.9px to simulate twist) -->
      <path d="M 149.1,80 C 156.1,75 189.1,82 204.1,45"
            stroke="#c8823a" stroke-width="1" stroke-linecap="round" fill="none"/>

      <!-- Twist tick marks — 9 lines perpendicular to bezier at t=0.1…0.9.
           Positions and normals computed from the cubic bezier formula. -->
      <g stroke="#9a6830" stroke-width="0.9" stroke-linecap="round" opacity="0.75">
        <line x1="152.3" y1="76.5" x2="153.5" y2="81.1"/>  <!-- t=0.1 -->
        <line x1="156.6" y1="75.6" x2="157.4" y2="80.4"/>  <!-- t=0.2 -->
        <line x1="161.6" y1="74.8" x2="162.4" y2="79.6"/>  <!-- t=0.3 -->
        <line x1="167.6" y1="73.9" x2="168.6" y2="78.5"/>  <!-- t=0.4 -->
        <line x1="173.8" y1="72.2" x2="175.2" y2="76.8"/>  <!-- t=0.5 -->
        <line x1="179.5" y1="69.7" x2="181.5" y2="74.1"/>  <!-- t=0.6 -->
        <line x1="186.4" y1="66.0" x2="189.2" y2="69.8"/>  <!-- t=0.7 -->
        <line x1="192.5" y1="60.7" x2="195.9" y2="64.1"/>  <!-- t=0.8 -->
        <line x1="197.9" y1="53.5" x2="202.1" y2="56.1"/>  <!-- t=0.9 -->
      </g>

      <!-- ── Bomb body ──────────────────────────────────────────────────────── -->
      <circle cx="150" cy="190" r="100" fill="url(#bodyGrad)"/>

      <!-- Rim highlight: UIColor(white:0.35, alpha:0.5) = rgb(89,89,89) @ 50% -->
      <circle cx="150" cy="190" r="99"
              fill="none"
              stroke="rgb(89,89,89)" stroke-opacity="0.50" stroke-width="1.5"/>

      <!-- Specular highlight spot (top-left quadrant) -->
      <circle cx="120" cy="162" r="30" fill="url(#hlGrad)"/>

      <!-- ── Fuse stem (rounded rect at top of bomb, drawn over body) ──────── -->
      <!-- stemW=8, stemH=13, centred on bomb top, 2px overlap into sphere -->
      <rect x="146" y="79" width="8" height="13" rx="2" fill="#4a3a2a"/>

      <!-- ── Flame (animated, pivots around wick tip at 205,45) ────────────── -->

      <!-- Outer flame: #ff6600 @ 85%, ellipse 8×18 → rx=4, ry=9, centre=(205,37) -->
      <g id="flame-outer" filter="url(#fg)">
        <ellipse cx="205" cy="37" rx="4" ry="9"
                 fill="#ff6600" fill-opacity="0.85"/>
      </g>

      <!-- Inner flame: #ffee44 @ 95%, ellipse 4×10 → rx=2, ry=5, centre=(205,40) -->
      <g id="flame-inner" filter="url(#fg)">
        <ellipse cx="205" cy="40" rx="2" ry="5"
                 fill="#ffee44" fill-opacity="0.95"/>
      </g>

      <!-- Spark: static white dot at wick tip — no animation (matches the app) -->
      <circle cx="205" cy="45" r="2.5" fill="white"/>
    </svg>
  </div>

  <h1 class="game-title">YOU GO BOOM</h1>
  <p class="game-subtitle">A &nbsp; Trap-Building &nbsp; Puzzle &nbsp; Game</p>

  <span class="badge">Coming Soon to iOS</span>
  <p class="platform">iPhone &amp; iPad</p>

</main>

<footer>
  <span>© 2026 Weitberg Inc.</span>
  <span aria-hidden="true">·</span>
  <a href="/privacy">Privacy Policy</a>
</footer>

</body>
</html>
